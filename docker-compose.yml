services:
  postgres:
    image: postgres:18-alpine
    container_name: nox-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nox
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nox"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nox-network

  redis:
    image: redis:7-alpine
    container_name: nox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nox-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migration-runner
    container_name: nox-migrate
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nox?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@postgres:5432/nox?schema=public"
    networks:
      - nox-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nox-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nox?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@postgres:5432/nox?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "docker-secret-change-in-production"
      JWT_EXPIRES_IN: "24h"
      JWT_REFRESH_EXPIRES_IN: "7d"
      NODE_ENV: "production"
      NEXT_PUBLIC_SITE_NAME: "NOX"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:3000/api"
    env_file:
      - .env
    networks:
      - nox-network

networks:
  nox-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
