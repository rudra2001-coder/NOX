services:
  - type: web
    name: nox
    runtime: node
    repo: https://github.com/your-username/nox
    plan: starter
    region: oregon
    buildCommand: npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nox-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: nox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_SITE_NAME
        value: NOX
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          type: web
          name: nox
          property: host
      - key: STORAGE_PROVIDER
        value: local
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: WEBP_QUALITY
        value: "80"

databases:
  - name: nox-db
    databaseName: nox
    plan: starter
    region: oregon
    postgresMajorVersion: 16
    ipAllowList: []
