services:
  - type: web
    name: nox
    runtime: node
    repo: https://github.com/anomalyco/nox
    plan: free
    branch: main
    healthCheckPath: /api/health
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nox-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: nox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_SITE_NAME
        value: NOX
      - key: NEXT_PUBLIC_SITE_URL
        value: https://nox.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://nox.onrender.com/api

databases:
  - name: nox-db
    plan: free
    region: oregon
    databaseName: nox
    postgresMajorVersion: 18
    ipAllowList: []
